<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Election 2026</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

    background:
    linear-gradient(
        rgba(0,0,0,0.45),
        rgba(0,0,0,0.45)
    ),
    url("{{ url_for('static', filename='bg.jpg') }}");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

        .container{
            background:white;
            width:400px;
            padding:40px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
            text-align:center;
        }

        .logo{
            width:120px;
            margin-bottom:20px;
        }

        h1{
            color:#1e3a8a;
            margin-bottom:10px;
        }

        h2{
            color:#444;
            font-size:18px;
            margin-bottom:30px;
            font-weight:normal;
        }

        input{
            width:100%;
            padding:15px;
            border:2px solid #d1d5db;
            border-radius:10px;
            font-size:16px;
            margin-bottom:20px;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
        }

        button{
            width:100%;
            padding:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .footer{
            margin-top:25px;
            color:#777;
            font-size:13px;
        }

    </style>

</head>

<body>

    <div class="container">

        <img
            src="{{ url_for('static', filename='logo.png') }}"
            class="logo"
            alt="School Logo">

        <h1>The Study L'Ecole Internationale</h1>

        <h2>
            Student Council Election 2026
        </h2>

        <form method="POST">

            <input
                type="text"
                name="ts_no"
                placeholder="Enter TS Number"
                required>

            <button type="submit">
                Proceed to Vote
            </button>

        </form>

        <div class="footer">
            One Vote Per Student
        </div>

    </div>

</body>

</html>
